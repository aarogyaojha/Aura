name: Aura CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ── Backend Tests ─────────────────────────────────────────────────────────
  server-test:
    name: Server Tests
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7.0
        ports:
          - 27017:27017

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        working-directory: ./server
        run: npm ci

      - name: Run server tests
        working-directory: ./server
        env:
          MONGODB_URI: mongodb://localhost:27017/aura_test
          JWT_SECRET: test-jwt-secret-ci
          NODE_ENV: test
        run: npm test

  # ── Frontend Build ────────────────────────────────────────────────────────
  client-build:
    name: Client Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        working-directory: ./client
        run: npm ci

      - name: Build client
        working-directory: ./client
        env:
          VITE_API_URL: http://localhost:4000
        run: npm run build

  # ── Lint (both) ───────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Lint server
        working-directory: ./server
        run: |
          npm ci
          npx eslint . --ext .js --max-warnings 0 || true

      - name: Lint client
        working-directory: ./client
        run: |
          npm ci
          npx eslint . --ext .jsx,.js --max-warnings 0 || true
